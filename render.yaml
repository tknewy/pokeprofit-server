services:
  - type: web
    name: pokeprofit-server
    runtime: node
    buildCommand: npm install
    startCommand: node server.js
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: NODE_VERSION
        value: "20.11.0"
